---
# ===================================================================
# VSCode — version 100 % idempotente et compatible Ansible 2.18
# ===================================================================

- name: Ajouter le dépôt VSCode
  become: true
  ansible.builtin.copy:
    dest: "{{ vscode_repo_file }}"
    content: "{{ vscode_repo_content }}"
    owner: root
    group: root
    mode: '0644'

- name: Installer VSCode
  become: true
  ansible.builtin.dnf:
    name: "{{ vscode_package }}"
    state: present

- name: Créer le dossier de configuration VSCode
  ansible.builtin.file:
    path: "{{ vscode_settings_file | dirname }}"
    state: directory
    mode: '0755'

- name: Générer settings.json VSCode (idempotent)
  ansible.builtin.template:
    src: "settings.json.j2"
    dest: "{{ vscode_settings_file }}"
    mode: '0644'

- name: Installer VSCode Insiders
  become: true
  ansible.builtin.dnf:
    name: code-insiders
    state: present
  when: install_vscode_insiders
  tags:
    - devtools
    - vscode
    - vscode_insiders
